name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build distributions
        run: chmod +x build.sh && ./build.sh

      - name: Create zip archives
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Full plugin (Claude Code)
          zip -r "ux-skills-plugin-${TAG}.zip" \
            .claude-plugin/ \
            skills/ \
            agents/ \
            HOW-TO-USE.md \
            README.md \
            LICENSE \
            CREDITS.md

          # Cursor rules
          zip -r "ux-skills-cursor-${TAG}.zip" \
            .cursor/rules/

          # VS Code Copilot
          zip -r "ux-skills-copilot-${TAG}.zip" \
            .github/copilot/ \
            .github/copilot-instructions.md \
            .github/AGENTS.md

          # Source skills (for manual installation)
          zip -r "ux-skills-skills-${TAG}.zip" \
            skills/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ux-skills-plugin-*.zip
            ux-skills-cursor-*.zip
            ux-skills-copilot-*.zip
            ux-skills-skills-*.zip
          body: |
            ## Install

            ```bash
            npx skills add princepal9120/ux-skills --all
            ```

            **Claude Code (plugin):**
            ```
            /plugin marketplace add princepal9120/ux-skills
            ```
            Then open `/plugin` in Claude Code to install.

            **Cursor:** Download the cursor zip and extract to your project root.

            **VS Code Copilot:** Download the copilot zip and extract to your project root.

            See [README](https://github.com/princepal9120/ux-skills#readme) for full documentation.
